kind = "web"
previewPath = "/"
title = "PlayPalette"
version = "1.0.0"
id = "artifacts/playpalette"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22271

[services.development]
run = "pnpm --filter @workspace/playpalette run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/playpalette", "run", "build" ]
publicDir = "artifacts/playpalette/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22271"
BASE_PATH = "/"
